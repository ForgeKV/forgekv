<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ForgeKV Logo Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f4f4f4; font-family: 'Segoe UI', sans-serif; padding: 40px; display: flex; flex-direction: column; gap: 48px; }
  h2 { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #888; margin-bottom: 16px; }
  .row { display: flex; align-items: center; gap: 32px; flex-wrap: wrap; }
  .box { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .label { font-size: 11px; color: #aaa; }
  .bg-white { background: #fff; padding: 24px 32px; border-radius: 10px; border: 1px solid #e8e8e8; }
  .bg-dark  { background: #0F1419; padding: 24px 32px; border-radius: 10px; }
  .bg-mid   { background: #1A2332; padding: 24px 32px; border-radius: 10px; }
  .divider  { border: none; border-top: 1px solid #e0e0e0; }
  .sizes { display: flex; align-items: flex-end; gap: 28px; flex-wrap: wrap; }
</style>
</head>
<body>

  <div>
    <h2>Wordmark — Light &amp; Dark backgrounds</h2>
    <div class="row">
      <div class="box">
        <div class="bg-white"><img src="logo.svg" height="64"></div>
        <div class="label">Light</div>
      </div>
      <div class="box">
        <div class="bg-dark"><img src="logo-dark.svg" height="64"></div>
        <div class="label">Dark</div>
      </div>
      <div class="box">
        <div class="bg-mid"><img src="logo-dark.svg" height="64"></div>
        <div class="label">Mid-dark</div>
      </div>
    </div>
  </div>

  <hr class="divider">

  <div>
    <h2>Icon — All sizes</h2>
    <div class="sizes">
      <div class="box">
        <div class="bg-white" style="padding:16px"><img src="logo-icon.svg" width="256" height="256"></div>
        <div class="label">256px</div>
      </div>
      <div class="box">
        <div class="bg-white" style="padding:12px"><img src="logo-icon.svg" width="128" height="128"></div>
        <div class="label">128px</div>
      </div>
      <div class="box">
        <div class="bg-white" style="padding:8px"><img src="logo-icon.svg" width="64" height="64"></div>
        <div class="label">64px</div>
      </div>
      <div class="box">
        <div class="bg-white" style="padding:8px"><img src="logo-icon.svg" width="48" height="48"></div>
        <div class="label">48px</div>
      </div>
      <div class="box">
        <div class="bg-white" style="padding:8px"><img src="logo-icon.svg" width="32" height="32"></div>
        <div class="label">32px</div>
      </div>
      <div class="box">
        <div class="bg-white" style="padding:8px"><img src="logo-icon.svg" width="16" height="16"></div>
        <div class="label">16px</div>
      </div>
    </div>
  </div>

  <hr class="divider">

  <div>
    <h2>Icon on dark backgrounds</h2>
    <div class="row">
      <div class="box">
        <div class="bg-dark" style="padding:16px"><img src="logo-icon.svg" width="128" height="128"></div>
        <div class="label">Dark bg 128px</div>
      </div>
      <div class="box">
        <div class="bg-dark" style="padding:12px"><img src="logo-icon.svg" width="64" height="64"></div>
        <div class="label">64px</div>
      </div>
      <div class="box">
        <div class="bg-dark" style="padding:10px"><img src="logo-icon.svg" width="32" height="32"></div>
        <div class="label">32px</div>
      </div>
    </div>
  </div>

  <hr class="divider">

  <div>
    <h2>Compact / small wordmark</h2>
    <div class="row">
      <div class="box">
        <div class="bg-white"><img src="logo.svg" height="32"></div>
        <div class="label">32px tall</div>
      </div>
      <div class="box">
        <div class="bg-dark"><img src="logo-dark.svg" height="32"></div>
        <div class="label">32px tall dark</div>
      </div>
      <div class="box">
        <div class="bg-white"><img src="logo.svg" height="24"></div>
        <div class="label">24px tall</div>
      </div>
    </div>
  </div>

</body>
</html>
