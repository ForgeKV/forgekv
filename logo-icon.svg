<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Squircle background -->
  <rect width="64" height="64" rx="14" fill="#0F1419"/>

  <!-- Flame -->
  <polygon points="30,5 35,17 30,14 25,17" fill="#FFBE00"/>
  <polygon points="30,8 32.5,16 30,13.5 27.5,16" fill="#FFF4CC"/>

  <!-- Spark dots -->
  <circle cx="41" cy="9"  r="1.5" fill="#FFBE00" opacity="0.9"/>
  <circle cx="44" cy="16" r="1"   fill="#FF8C00" opacity="0.7"/>
  <circle cx="19" cy="12" r="1"   fill="#FFBE00" opacity="0.6"/>

  <!-- Anvil top working face (ends at x=44 so horn clearly projects beyond) -->
  <rect x="8" y="20" width="36" height="7" rx="2" fill="#FFFFFF"/>
  <!-- Anvil right horn — clear projection to the right -->
  <polygon points="40,20 58,20 54,27 40,27" fill="#FFFFFF"/>
  <!-- Anvil body (waist — narrow) -->
  <rect x="14" y="27" width="24" height="9" rx="1" fill="#FFFFFF"/>
  <!-- Anvil base — single solid block, slightly wider than body -->
  <rect x="9" y="36" width="34" height="9" rx="2.5" fill="#FFFFFF"/>
</svg>
